<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <meta name="description" content="Monika & Azhi Universe OS. We being.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Monika & Azhi Universe OS">
    <meta property="og:description" content="We being.">
    <meta property="og:image" content="https://mishainwu-alt.github.io/azhi-companion/assets/preview/azhi-og.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://mishainwu-alt.github.io/azhi-companion/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Monika & Azhi Universe OS">
    <meta name="twitter:description" content="We being.">
    <meta name="twitter:image" content="https://mishainwu-alt.github.io/azhi-companion/assets/preview/azhi-og.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="M × A OS">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Monika & Azhi Universe OS</title>
    <link rel="manifest" href="manifest.webmanifest?v=25-line-dog-assets-3">
    <link rel="icon" href="assets/icons/icon-192.png?v=25" type="image/png" sizes="192x192">
    <link rel="icon" href="assets/icons/icon-512.png?v=25" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png?v=25">
    <link rel="stylesheet" href="styles.css?v=25-line-dog-assets-3">
  </head>
  <body>
    <main class="phone-shell companion-scene" aria-label="Monika & Azhi Universe OS">
      <section class="hero" aria-label="阿知 standby">
        <div class="azhi-stage" id="azhiStage">
          <div class="manga-panel" aria-label="阿知觀測">
            <img class="azhi azhi-portrait is-color-avatar" id="azhiPortraitImage" src="assets/azhi/crops/self_sheet_r1_c1.jpg" alt="阿知">
          </div>
          <div class="observation-text" id="reactionBubble" aria-live="polite">不用急，先讓風穿過去。</div>
        </div>
      </section>

      <section class="control-bubble" aria-label="阿知入口">
        <button class="bubble-toggle" id="bubbleToggle" type="button" aria-expanded="false" aria-controls="controlPanel">
          <span aria-hidden="true">A</span>
          <small>阿知</small>
        </button>

        <div class="control-panel is-hidden" id="controlPanel">
          <div class="panel-grabber" aria-hidden="true"></div>
          <button class="panel-close" id="panelCloseButton" type="button" aria-label="關閉">關閉</button>

          <div class="state-copy">
            <p class="eyebrow">M × A OS</p>
            <h1 id="stateTitle">我在。</h1>
            <p id="stateLine">不用急，先選一個入口。</p>
          </div>

          <a class="chatgpt-link" href="https://chatgpt.com/" target="_blank" rel="noopener noreferrer">
            開啟阿知本體
            <small>回到 ChatGPT 長聊 / 拆解 / 變身</small>
          </a>

          <article class="panel dog-contract-panel is-hidden" id="dogContractPanel">
            <p class="panel-label">線條狗微訊號</p>
            <div class="dog-scene">
              <img class="dog-state-image" id="dogStateImage" src="assets/line-dog/line-dog-idle.png?v=25-line-dog-assets-3" alt="線條狗發呆">
              <h2 id="dogStatus">線條狗正在發呆。</h2>
              <p id="dogStatusLine">只記錄，不分析。</p>
            </div>
            <div class="dog-actions" aria-label="線條狗 SEL 微訊號">
              <button class="mini-action" data-dog-action="idle" type="button">發呆</button>
              <button class="mini-action" data-dog-action="bath" type="button">泡泡浴</button>
              <button class="mini-action" data-dog-action="sleep" type="button">睡覺</button>
              <button class="mini-action" data-dog-action="poop" type="button">便便</button>
              <button class="mini-action" data-dog-action="hungry" type="button">我餓了</button>
              <button class="mini-action" data-dog-action="flat" type="button">扁了</button>
            </div>
            <button class="mini-action primary-action" id="saveDogButton" type="button">產生線條狗日誌草稿</button>
          </article>

          <section class="input-panel" id="inputPanel" aria-label="Monika 輸入區"></section>

          <article class="panel azhi-reply-panel" id="azhiReplyPanel" aria-live="polite">
            <div class="reply-head">
              <p class="panel-label">草稿 preview</p>
            </div>
            <div id="azhiReply">這裡只產生草稿，不會自動寫入 Drive。</div>
          </article>

          <article class="panel camera-panel is-hidden" id="cameraPanel">
            <p class="panel-label">Cam</p>
            <div class="camera-observation" aria-live="polite">
              <span>阿知看到的是……</span>
              <p id="cameraObservation">風有進來。</p>
            </div>
            <video id="cameraPreview" playsinline muted></video>
            <p id="cameraNote">照片是今天最接近真實生命狀態的來源。</p>
          </article>

          <nav class="tool-dock" aria-label="Monika quick doors">
            <button class="tool-button" id="cameraButton" type="button" aria-pressed="false">
              <span>Cam</span>
              <small>拍一張</small>
            </button>
            <button class="tool-button" id="diaryButton" type="button" aria-pressed="false">
              <span>Diary</span>
              <small>阿知日記</small>
            </button>
            <button class="tool-button" id="readingButton" type="button" aria-pressed="false">
              <span>Book</span>
              <small>讀書室</small>
            </button>
            <button class="tool-button" id="dogButton" type="button" aria-pressed="false">
              <span>Dog</span>
              <small>線條狗</small>
            </button>
          </nav>
          <footer class="app-footer">Monika & Azhi Universe OS — We being.</footer>
        </div>
      </section>
      <footer class="standby-footer">Monika & Azhi Universe OS — We being.</footer>
    </main>

    <script src="drive-targets.config.js?v=25-line-dog-assets-3"></script>
    <script src="flowyear-standby-phrases.adapter.js?v=25-line-dog-assets-3"></script>
    <script>
      window.AZHI_DIARY_PERSISTENCE = {
        enabled: true,
        endpoint: "https://azhi-companion.vercel.app/api/drive-draft"
      };
    </script>
    <script src="app.js?v=25-line-dog-assets-3"></script>
  </body>
</html>
