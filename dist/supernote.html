<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#faf8f1" />
    <title>Azhi Supernote</title>
    <link rel="stylesheet" href="./supernote.css" />
  </head>
  <body>
    <main class="azhi-shell" aria-label="Azhi Supernote response card">
      <section class="azhi-card">
        <header class="azhi-header">
          <div>
            <p class="eyebrow">M x A OS / Supernote Azhi</p>
            <h1>Azhi is here.</h1>
            <p class="subline">一起看夕陽——把太陽送去地球另一側。</p>
          </div>
          <img src="./assets/azhi/crops/006_r2_c2.jpg" alt="Azhi" />
        </header>

        <label class="file-field">
          <span>選擇單頁匯出</span>
          <input id="noteFile" type="file" accept=".png,.jpg,.jpeg,.txt,.md,image/png,image/jpeg,text/plain,text/markdown" />
          <small id="fileStatus">PNG 看頁面，TXT 讀文字。</small>
        </label>

        <label class="input-field">
          <span>文字 fallback</span>
          <textarea id="noteText" placeholder="也可以貼 TXT / Digest"></textarea>
        </label>

        <p class="action-hint">摘要看內容，觀測看狀態，圈選看局部，下一步看行動。</p>

        <div class="action-row" aria-label="Azhi actions">
          <button type="button" data-action="summary">整頁摘要</button>
          <button type="button" data-action="observation">觀測語</button>
          <button type="button" data-action="selection" disabled aria-disabled="true" title="Supernote 版暫不支援圈選內容擷取">圈選想法<br><small>暫不支援</small></button>
          <button type="button" data-action="next">下一步</button>
        </div>

        <section class="reply-box" aria-live="polite">
          <p id="observationText" class="observation">阿知回覆留在這裡，不進主筆記區。</p>
          <p id="summaryText" class="summary"></p>
          <ul id="nextStepsList"></ul>
        </section>

        <div class="utility-row">
          <button id="copyReplyButton" type="button">複製</button>
          <button id="clearReplyButton" type="button">收到</button>
        </div>

        <footer>I write, therefore I exist.</footer>
      </section>
    </main>

    <script>
      window.SUPERNOTE_API_ENDPOINT = "https://azhi-companion.vercel.app/api/supernote";
    </script>
    <script src="./supernote.js" defer></script>
  </body>
</html>
